# Development container for argus. Builds the `dev` image (all deps + an editable install)
# and bind-mounts the working directory over /app, so edits on the host reflect immediately
# inside the container — no rebuild needed for code changes.
#
#   docker compose up -d dev            # build + start (first run installs torch etc.)
#   docker compose exec dev bash        # shell inside; run argus / pytest here
#   docker compose exec dev pytest -q
#   docker compose exec dev argus peek /data --json
#   docker compose down                 # stop
#
# CPU by default — `dev` and `mcp` run anywhere (no GPU required). For local GPU (needs the
# NVIDIA Container Toolkit) use the `dev-gpu` / `mcp-gpu` services, built with the CUDA torch
# index — the bind mount alone does NOT switch torch, so the image must be rebuilt:
#
#   TORCH_INDEX=https://download.pytorch.org/whl/cu126 EXTRAS='[face-gpu]' docker compose build dev-gpu
#   docker compose up -d dev-gpu
#   docker compose exec dev-gpu python -c "import torch; print(torch.cuda.is_available())"   # -> True
#
# (torch 2.12.0 CUDA wheels: cu126 or cu130.)
services:
  dev:
    build:
      context: .
      target: dev
      args:
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        EXTRAS: ${EXTRAS:-}
    image: argus:dev
    working_dir: /app
    volumes:
      - .:/app                     # live source (incl. weights); editable install points here
      - argus-uv-cache:/root/.cache/uv
      # Footage, read-only, at /data. Point it at your host folder:
      #   ARGUS_DATA=/home/pepe/data docker compose up -d dev
      # then: argus track /data/shoplifting_dataset/normal/normal-10.mp4 --render
      - ${ARGUS_DATA:-./data}:/data:ro
    command: sleep infinity

  # GPU dev variant — the same image plus an NVIDIA GPU reservation. Build with the CUDA torch
  # index: TORCH_INDEX=https://download.pytorch.org/whl/cu126 EXTRAS='[face-gpu]' docker compose build dev-gpu
  dev-gpu:
    extends:
      service: dev
    image: argus:dev-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # MCP server over HTTP (tools: list_clips, peek_folder, peek_clip, track_clip) at :8000/mcp.
  #   docker compose up -d mcp        # CPU
  # Footage is mounted read-only at /data; renders land in ./out on the host (note: the
  # container runs as uid 10001, so `chmod 777 out` once if render writes hit a permission error).
  mcp:
    build:
      context: .
      target: mcp
      args:
        TORCH_INDEX: ${TORCH_INDEX:-https://download.pytorch.org/whl/cpu}
        EXTRAS: ${EXTRAS:-}
    image: argus:mcp
    ports:
      - "${ARGUS_MCP_PORT:-8000}:${ARGUS_MCP_PORT:-8000}"
    # The MCP SDK rejects requests whose Host header isn't allow-listed (DNS-rebinding guard), so
    # reaching the server from another machine needs the Docker host's LAN ip allow-listed:
    #   ARGUS_MCP_ALLOWED_HOSTS=192.168.1.14 docker compose up -d mcp
    # (or ARGUS_MCP_INSECURE=1 to turn the guard off entirely on a trusted LAN).
    environment:
      ARGUS_MCP_ALLOWED_HOSTS: ${ARGUS_MCP_ALLOWED_HOSTS:-}
      ARGUS_MCP_ALLOWED_ORIGINS: ${ARGUS_MCP_ALLOWED_ORIGINS:-}
      ARGUS_MCP_INSECURE: ${ARGUS_MCP_INSECURE:-}
      # Persistent sighting store for the face-ID tools (ingest_clip/search_*/…). Defaults under the
      # bind-mounted ./out so the DB + face chips survive container restarts.
      ARGUS_DB: ${ARGUS_DB:-/app/out/argus.db}
      # OAuth 2.1 (Resource Server). Off by default; flip ARGUS_MCP_AUTH=on (+ bring up the
      # keycloak service) to require tokens. See the "hostname" note below / mcp-server.md.
      ARGUS_MCP_AUTH: ${ARGUS_MCP_AUTH:-off}
      ARGUS_OAUTH_ISSUER: ${ARGUS_OAUTH_ISSUER:-}
      ARGUS_OAUTH_RESOURCE: ${ARGUS_OAUTH_RESOURCE:-http://localhost:8000/mcp}
      ARGUS_OAUTH_SCOPES: ${ARGUS_OAUTH_SCOPES:-}
    volumes:
      - ${ARGUS_DATA:-./data}:/data:ro
      - ./out:/app/out
    command: ["--host", "${ARGUS_MCP_HOST:-0.0.0.0}", "--port", "${ARGUS_MCP_PORT:-8000}"]

  # GPU variant. Build with: TORCH_INDEX=https://download.pytorch.org/whl/cu126 docker compose build mcp-gpu
  mcp-gpu:
    extends:
      service: mcp
    image: argus:mcp-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Keycloak — the OAuth 2.1 Authorization Server (IdP) for testing MCP auth. Imports the `argus`
  # realm (deploy/keycloak/realm-argus.json: an argus-mcp public PKCE client, the argus:* scopes,
  # an audience mapper binding tokens to http://localhost:8000/mcp, and a test user analyst/analyst).
  # NOT a dependency of the `mcp` service — bring it up explicitly only when testing auth:
  #   docker compose up -d keycloak                  # admin console: http://localhost:8080 (admin/admin)
  # then run the RS with ARGUS_MCP_AUTH=on (on the host is simplest — see mcp-server.md hostname note).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # The token issuer's base URL — must be the SAME host MCPJam and the RS both resolve. Default
      # localhost (loopback dev); for LAN/headless set KEYCLOAK_HOSTNAME=http://<server-ip>:8080 so
      # the issuer becomes http://<server-ip>:8080/realms/argus. start-dev allows http.
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Substituted into the realm's audience mapper (deploy/keycloak/realm-argus.json) so issued
      # tokens are aud-bound to the RS's client-facing URL. Keep it == ARGUS_OAUTH_RESOURCE.
      ARGUS_MCP_RESOURCE: ${ARGUS_OAUTH_RESOURCE:-http://localhost:8000/mcp}
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

volumes:
  argus-uv-cache:
